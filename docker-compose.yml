services:
  mysql-mcp:
    image: neverinfamous/mysql-mcp:latest
    ports:
      - "3000:3000"
    command:
      - --transport
      - http
    env_file:
      - .env # Copy .env.example to .env to configure
    volumes:
      - ./data:/data
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
