services:
  mysql-mcp:
    image: writenotenow/mysql-mcp:latest
    ports:
      - "3000:3000"
    command:
      - --transport
      - http
      - --allowed-io-roots
      - /data
      - --audit-log
      - /data/audit.jsonl
    environment:
      - MCP_AUTH_TOKEN=your-secure-token # Required for HTTP mode
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=testdb
      - MYSQL_POOL_SIZE=20
      - MYSQLMCP_PORT=3000
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/data
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
