services:
  mysql-mcp:
    image: writenotenow/mysql-mcp:latest
    ports:
      - "3000:3000"
    command:
      - --transport
      - http
      - --port
      - "3000"
      - --allowed-io-roots
      - /data
      - --audit-log
      - /data/audit.jsonl
      - --mysql
      - mysql://root:password@mysql:3306/testdb
    environment:
      - MYSQL_POOL_SIZE=20
    volumes:
      - ./data:/data
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
