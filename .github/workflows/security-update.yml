name: Security Update Check

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
  workflow_call:
  workflow_dispatch:

concurrency:
  group: security-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # C-20: trimmed from write — workflow only reads source

jobs:
  security-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    outputs:
      scan-failed: ${{ steps.check-scan.outputs.failed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image for scanning
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          tags: security-test:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run SARIF scan first (non-blocking) to always generate the file
      - name: Run Trivy scanner for SARIF output
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: security-test:latest
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH,MEDIUM"
          trivyignores: ".trivyignore"
          skip-dirs: "/usr/local/lib/node_modules/npm"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

      # Run table scan (blocking) after SARIF is uploaded
      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: security-test:latest
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH,MEDIUM"
          trivyignores: ".trivyignore"
          skip-dirs: "/usr/local/lib/node_modules/npm"

      - name: Check scan result
        id: check-scan
        if: always()
        env:
          TRIVY_OUTCOME: ${{ steps.trivy-scan.outcome }}
        run: |
          if [ "$TRIVY_OUTCOME" = "failure" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # Separate job for issue creation — scoped with issues: write
  create-issue:
    needs: [security-scan]
    if: ${{ always() && needs.security-scan.outputs.scan-failed == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create security issue if vulnerabilities found
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SCHEDULE: ${{ github.event.schedule || 'Manual trigger' }}
        with:
          script: |
            const title = '🚨 Security vulnerabilities detected in Docker images'

            // Check for existing open issue with same title to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,vulnerability,docker',
              per_page: 10,
            })
            if (existing.some(issue => issue.title === title)) {
              console.log('Open security issue already exists — skipping creation')
              return
            }

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `
              ## Security Alert

              Trivy has detected security vulnerabilities in our Docker images.

              **Action Required:**
              1. Review the security scan results in the Actions tab
              2. Update base images and dependencies
              3. Test the fixes
              4. Deploy updated images

              **Scan Details:**
              - Workflow run: ${process.env.SERVER_URL}/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}
              - Triggered by: Weekly security scan
              - Scan Date: ${process.env.SCHEDULE}

              **Next Steps:**
              - [ ] Review vulnerability details
              - [ ] Update Dockerfiles
              - [ ] Test changes
              - [ ] Deploy fixes
              `,
              labels: ['security', 'vulnerability', 'docker']
            })
