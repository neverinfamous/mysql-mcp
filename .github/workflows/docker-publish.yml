name: Build and Push Docker Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      emergency_bypass:
        description: 'Bypass upstream gatekeeper checks AND environment gates (EMERGENCY ONLY)'
        type: boolean
        required: true
        default: false
      bypass_reason:
        description: 'Justification for bypassing upstream safety gates (required when emergency_bypass is true)'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: writenotenow/mysql-mcp

permissions:
  contents: read

jobs:
  # Security scan BEFORE any images are pushed
  # This ensures no vulnerable images reach Docker Hub
  security-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Require emergency bypass acknowledgment
        if: github.event_name == 'workflow_dispatch'
        env:
          BYPASS_REASON: ${{ inputs.bypass_reason }}
        run: |
          if [ "${{ inputs.emergency_bypass }}" != "true" ]; then
            echo "❌ Error: Direct execution via workflow_dispatch bypasses upstream safety gates."
            echo "To proceed, you must explicitly check the 'emergency_bypass' option."
            exit 1
          fi
          if [ ${#BYPASS_REASON} -lt 10 ]; then
            echo "❌ Error: Emergency bypass requires a justification reason of at least 10 characters."
            exit 1
          fi
          echo "⚠️ Emergency Bypass Acknowledged"
          echo "Justification: $BYPASS_REASON"

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image for scanning (local only)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: local-scan:latest
          cache-from: type=gha,scope=linux/amd64
          cache-to: type=gha,scope=linux/amd64,mode=max

      - name: Docker Scout security scan
        uses: docker/scout-action@481412c8b8de36d0f79e85aa382c60397466feb6 # v1
        timeout-minutes: 10
        with:
          command: cves
          image: local-scan:latest
          only-fixed: true
          only-severities: critical,high,medium,low
          exit-code: true
        env:
          DOCKER_SCOUT_HUB_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_SCOUT_HUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local-scan:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM,LOW
          timeout: 10m

      - name: Trivy SARIF upload
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local-scan:latest
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM,LOW
          timeout: 10m

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-docker-scan

  # Smoke test: verify the Docker image actually starts before pushing
  # Prevents shipping images that pass CVE scans but crash at runtime (neverinfamous/mysql-mcp#149)
  smoke-test:
    needs: [security-scan]
    if: ${{ needs.security-scan.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image for smoke test
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: smoke-test:latest
          cache-from: type=gha,scope=linux/amd64
          cache-to: type=gha,scope=linux/amd64,mode=max

      - name: Smoke test — binary loads without crash
        run: |
          # Verify the container can execute --help without import errors
          docker run --rm smoke-test:latest --help
          echo "✅ Binary load smoke test passed"

      - name: Smoke test — HTTP transport starts
        run: |
          # Start with router filter (no MySQL connection needed)
          docker run --rm -d --name smoke-http -p 3000:3000 \
            -e MCP_TRANSPORT=http -e PORT=3000 -e HOST=0.0.0.0 \
            -e TOOL_FILTER=router smoke-test:latest \
            --transport http --port 3000 --server-host 0.0.0.0 --tool-filter router
          sleep 5
          if ! docker ps --filter name=smoke-http --format '{{.Status}}' | grep -q "Up"; then
            echo "❌ HTTP smoke test failed — container crashed"
            docker logs smoke-http 2>&1 || true
            exit 1
          fi
          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/health || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health endpoint returned $HTTP_STATUS"
            docker logs smoke-http 2>&1 || true
            docker stop smoke-http || true
            exit 1
          fi
          docker stop smoke-http
          echo "✅ HTTP transport smoke test passed"

  # Build each platform on native architecture (only runs if security scan passes)
  build-platform:
    needs: [security-scan, smoke-test]
    if: needs.smoke-test.result == 'success' && github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[0-9.]+' package.json | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          provenance: mode=max
          sbom: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge platform images into multi-arch manifest
  merge-and-push:
    runs-on: ubuntu-24.04
    needs: [build-platform]
    if: needs.build-platform.result == 'success' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      deployments: write

    environment:
      # Evaluates to 'production' if tag push OR emergency bypass, otherwise '' (no environment gate)
      name: ${{ (startsWith(github.ref, 'refs/tags/v') || inputs.emergency_bypass) && 'production' || '' }}
      url: https://hub.docker.com/r/writenotenow/mysql-mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[0-9.]+' package.json | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata for manifest
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }},enable=true
            type=raw,value=latest,enable=true
            type=sha,prefix=sha-,format=short

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      # Update Docker Hub description
      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        timeout-minutes: 5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./DOCKER_README.md
          short-description: "MySQL MCP server with 241 tools, Code Mode, OAuth 2.1, HTTP/SSE, and Audit Logs."

      - name: Deployment Summary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "✅ Successfully published Docker images to production"
          echo "🐳 Registry: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Published by: ${{ github.actor }}"
