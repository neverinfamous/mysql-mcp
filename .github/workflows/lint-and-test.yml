name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [24.x, 26.x]

    services:
      mysql:
        image: mysql:9.1
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native dependencies
        run: pnpm rebuild

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Seed Database
        run: mysql -h 127.0.0.1 -P 3307 -uroot -proot testdb < test-server/test-seed.sql

      - name: Run validation check
        run: pnpm run check
        env:
          MYSQL_TEST_URL: mysql://root:root@127.0.0.1:3307/testdb

  security-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate

  # Smoke test: verify the Docker image builds and starts successfully
  # Catches dependency resolution failures that only surface after pnpm prune (neverinfamous/mysql-mcp#149)
  docker-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: pr-smoke-test:latest
          cache-from: type=gha,scope=pr-smoke
          cache-to: type=gha,scope=pr-smoke,mode=max

      - name: Smoke test — binary loads without crash
        run: |
          docker run --rm pr-smoke-test:latest --help
          echo "✅ Binary load smoke test passed"

      - name: Smoke test — HTTP transport starts
        run: |
          docker run -d --name pr-smoke -p 3000:3000 \
            -e MCP_TRANSPORT=http -e PORT=3000 -e HOST=0.0.0.0 \
            -e ALLOWED_IO_ROOTS=/tmp \
            -e TOOL_FILTER=router pr-smoke-test:latest \
            --transport http --port 3000 --server-host 0.0.0.0 --tool-filter router
          sleep 5
          if ! docker ps --filter name=pr-smoke --format '{{.Status}}' | grep -q "Up"; then
            echo "❌ Docker smoke test failed — container crashed on startup"
            docker logs pr-smoke 2>&1 || true
            exit 1
          fi
          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/health || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health endpoint returned $HTTP_STATUS"
            docker logs pr-smoke 2>&1 || true
            docker stop pr-smoke || true
            exit 1
          fi
          docker stop pr-smoke
          echo "✅ Docker smoke test passed"
