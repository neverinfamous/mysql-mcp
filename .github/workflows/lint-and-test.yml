name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x, 25.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  # Smoke test: verify the Docker image builds and starts successfully
  # Catches dependency resolution failures that only surface after npm prune (neverinfamous/db-mcp#149)
  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: pr-smoke-test:latest
          cache-from: type=gha,scope=pr-smoke
          cache-to: type=gha,scope=pr-smoke,mode=max

      - name: Smoke test — binary loads without crash
        run: |
          docker run --rm pr-smoke-test:latest --help
          echo "✅ Binary load smoke test passed"

      - name: Smoke test — HTTP transport starts
        run: |
          # Start with router filter (no MySQL connection needed)
          docker run --rm -d --name pr-smoke -p 3000:3000 \
            -e MCP_TRANSPORT=http -e PORT=3000 -e HOST=0.0.0.0 \
            -e TOOL_FILTER=router pr-smoke-test:latest \
            --transport http --port 3000 --server-host 0.0.0.0 --no-auth-enforcement --tool-filter router
          sleep 5
          if ! docker ps --filter name=pr-smoke --format '{{.Status}}' | grep -q "Up"; then
            echo "❌ Docker smoke test failed — container crashed on startup"
            docker logs pr-smoke 2>&1 || true
            exit 1
          fi
          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/health || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health endpoint returned $HTTP_STATUS"
            docker logs pr-smoke 2>&1 || true
            docker stop pr-smoke || true
            exit 1
          fi
          docker stop pr-smoke
          echo "✅ Docker smoke test passed"
