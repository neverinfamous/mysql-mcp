name: Publish to NPM

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match VERSION file or package.json)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@neverinfamous/mysql-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(head -1 VERSION | tr -d '[:space:]')
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Verify version parameter
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            PKG_VERSION="${{ steps.version.outputs.version }}"
            if [ "$PKG_VERSION" != "${{ github.event.inputs.version }}" ]; then
              echo "Error: Version mismatch!"
              echo "Expected: ${{ github.event.inputs.version }}"
              echo "Got: $PKG_VERSION"
              exit 1
            fi
          fi

      - name: Build package
        run: pnpm run build

      - name: Publish to NPM
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        continue-on-error: true
        run: |
          echo "Waiting for npm registry propagation..."
          for i in 1 2 3; do
            sleep 30
            echo "Attempt $i: Checking npm registry..."
            if pnpm view @neverinfamous/mysql-mcp version --registry https://registry.npmjs.org 2>/dev/null; then
              echo "✅ Package verified on npm registry"
              exit 0
            fi
            echo "Package not yet visible, retrying..."
          done
          echo "⚠️ Package may still be propagating to npm registry. This is informational only."
