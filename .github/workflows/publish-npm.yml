name: Publish to NPM

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match VERSION file or package.json)"
        required: false
        default: ""
      emergency_bypass:
        description: 'Bypass upstream gatekeeper checks (EMERGENCY ONLY)'
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment:
      name: npm
      url: https://www.npmjs.com/package/@neverinfamous/mysql-mcp

    steps:
      - name: Verify emergency bypass
        if: github.event_name == 'workflow_dispatch' && inputs.emergency_bypass != true
        run: |
          echo "❌ Error: Direct execution via workflow_dispatch bypasses upstream safety gates."
          echo "To proceed, you must explicitly check the 'emergency_bypass' option."
          exit 1

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(head -1 VERSION | tr -d '[:space:]')
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Verify version parameter
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            PKG_VERSION="${{ steps.version.outputs.version }}"
            if [ "$PKG_VERSION" != "${{ github.event.inputs.version }}" ]; then
              echo "Error: Version mismatch!"
              echo "Expected: ${{ github.event.inputs.version }}"
              echo "Got: $PKG_VERSION"
              exit 1
            fi
          fi

      - name: Build package
        run: pnpm run build

      - name: Publish to NPM
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          echo "Waiting for npm registry propagation..."
          for i in 1 2 3; do
            sleep 30
            echo "Attempt $i: Checking npm registry..."
            if pnpm view @neverinfamous/mysql-mcp@${{ steps.version.outputs.version }} version --registry https://registry.npmjs.org 2>/dev/null; then
              echo "✅ Package verified on npm registry"
              exit 0
            fi
            echo "Package not yet visible, retrying..."
          done
          echo "⚠️ Package may still be propagating to npm registry. This is informational only."
