name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  lint:
    uses: ./.github/workflows/lint-and-test.yml
    permissions:
      contents: read

  codeql:
    uses: ./.github/workflows/codeql.yml
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read

  secrets:
    uses: ./.github/workflows/secrets-scanning.yml
    permissions:
      contents: read

  trivy:
    uses: ./.github/workflows/security-update.yml
    permissions:
      contents: read
      security-events: write
      issues: write

  publish:
    needs: [lint, codeql, secrets, trivy]
    # Publish only on tag pushes (v*) after ALL security gates pass.
    # Main-branch pushes (squash merge) run checks only — the tag push triggers the actual publish.
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.lint.result == 'success' &&
      needs.codeql.result == 'success' &&
      needs.secrets.result == 'success' &&
      needs.trivy.result == 'success'
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      security-events: write
      id-token: write
      packages: write
      attestations: write
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  publish-npm:
    needs: [lint, codeql, secrets, trivy]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.lint.result == 'success' &&
      needs.codeql.result == 'success' &&
      needs.secrets.result == 'success' &&
      needs.trivy.result == 'success'
    uses: ./.github/workflows/publish-npm.yml
    permissions:
      contents: read
      id-token: write
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
