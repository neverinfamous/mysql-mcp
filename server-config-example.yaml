# MySQL MCP Server Configuration Example
# You can load this file by running: mysql-mcp --config path/to/server-config-example.yaml
#
# Configuration Priority: CLI Flags > Environment Variables > Config File > Defaults
# For database connections and OAuth settings, the entire array/object must come from a single source
# to prevent mixing environments (e.g. CLI databases will fully override FILE databases).

# Server Core Settings
host: "127.0.0.1"
port: 3000
transport: "stdio" # or "http", "sse"
enableHSTS: false
trustProxy: false

# Tooling and Sandbox
toolFilter: "-admin,-shell" # Exclude admin and shell tools for safety
allowedIoRoots:
  - "/var/backups/mysql"
  - "/tmp/mcp-sandbox"

# Audit Logging Configuration
auditConfig:
  enabled: true
  logPath: "/var/log/mysql-mcp/audit.jsonl"
  redact: true
  auditReads: false
  maxSizeBytes: 10485760 # 10MB
  backup:
    enabled: true
    includeData: false
    maxDataSizeBytes: 1048576 # 1MB

# Databases Configuration
# Only the first database in the array is currently connected/supported by the MySQL adapter.
databases:
  - type: "mysql"
    host: "localhost"
    port: 3306
    username: "mcp_user"
    password: "secure_password"
    database: "production_db"
    pool:
      connectionLimit: 10
      acquireTimeout: 10000
      waitForConnections: true
      queueLimit: 0

# OAuth 2.0 Resource Server Settings (Optional)
oauth:
  enabled: false
  issuer: "https://auth.example.com"
  audience: "mysql-mcp"
  jwksUri: "https://auth.example.com/.well-known/jwks.json"
  clockTolerance: 60
